<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anna Nails Novi Sad | Manicure Online Booking</title>
    <meta
      name="description"
      content="Anna Nails in Novi Sad. Manicure, gel polish, nail design and online booking via Telegram."
    />
    <meta
      name="keywords"
      content="manicure Novi Sad, nails Novi Sad, gel polish Novi Sad, nail design Novi Sad, online booking nails"
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#c33868" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Anna Nails Novi Sad | Manicure Online Booking" />
    <meta
      property="og:description"
      content="Manicure, gel polish and nail design in Novi Sad. Book online in Telegram."
    />
    <meta
      property="og:image"
      content="https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=1200&q=85"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="./styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BeautySalon",
        "name": "Anna Nails",
        "description": "Manicure, gel polish and nail design in Novi Sad.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Булевар ослобођења 119",
          "postalCode": "21000",
          "addressLocality": "Novi Sad",
          "addressCountry": "RS"
        },
        "areaServed": "Novi Sad",
        "priceRange": "RSD",
        "url": "https://dun4ev.github.io/beauty-master-landing/",
        "sameAs": [
          "https://t.me/Beauty_Master_name_bot",
          "https://www.instagram.com/"
        ]
      }
    </script>
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="master-name">
        <img class="hero__image" id="hero-image" alt="Fresh manicure close-up" />
        <div class="hero__shade"></div>

        <div class="hero__content">
          <div class="language-switcher" data-language-switcher></div>
          <div class="topline">
            <span id="demo-label">Demo page</span>
            <span id="online-booking-label">Online booking</span>
            <span id="city"></span>
            <span id="languages"></span>
          </div>

          <h1 id="master-name"></h1>
          <p id="tagline" class="tagline"></p>
          <p id="demo-note" class="demo-note"></p>

          <div class="actions" aria-label="Primary actions">
            <a class="button button--primary" id="booking-link" href="#">
              <i data-lucide="calendar-check"></i>
              <span id="booking-label">Book online</span>
            </a>
            <a class="button button--ghost" id="portfolio-link" href="#">
              <i data-lucide="image"></i>
              <span id="portfolio-label">Portfolio</span>
            </a>
            <a class="button button--ghost" href="./features.html">
              <i data-lucide="sparkles"></i>
              <span id="features-label">Bot features</span>
            </a>
          </div>
        </div>
      </section>

      <section class="content-band" aria-label="Profile details">
        <div class="quick-links" aria-label="Contact links">
          <a id="telegram-link" class="quick-link" href="#">
            <i data-lucide="send"></i>
            <span>Telegram</span>
          </a>
          <a id="viber-link" class="quick-link" href="#">
            <i data-lucide="phone"></i>
            <span>Viber</span>
          </a>
          <a id="whatsapp-link" class="quick-link" href="#">
            <i data-lucide="message-circle"></i>
            <span>WhatsApp</span>
          </a>
          <a id="instagram-link" class="quick-link" href="#">
            <i data-lucide="instagram"></i>
            <span>Instagram</span>
          </a>
        </div>

        <section class="section" aria-labelledby="services-title">
          <div class="section-heading">
            <h2 id="services-title"></h2>
            <p id="currency-label"></p>
          </div>
          <div class="service-list" id="service-list"></div>
        </section>

        <section class="section demo-section" aria-labelledby="demo-title">
          <div class="section-heading">
            <h2 id="demo-title"></h2>
            <p id="demo-subtitle"></p>
          </div>

          <div class="demo-grid">
            <button class="demo-video" id="demo-video-wrap" type="button">
              <div class="demo-placeholder" id="demo-placeholder">
                <i data-lucide="play-circle"></i>
                <strong id="demo-video-title"></strong>
                <span id="demo-video-text"></span>
              </div>
            </button>

            <div class="demo-steps" id="demo-steps"></div>
          </div>
        </section>

        <section class="section location-section" aria-labelledby="location-title">
          <div class="location-copy">
            <h2 id="location-title">Location</h2>
            <p id="address"></p>
            <a class="button button--secondary" id="maps-link" href="#">
              <i data-lucide="map-pin"></i>
              <span id="maps-label">Open in Google Maps</span>
            </a>
          </div>
          <a class="map-link" id="map-click-link" href="#" aria-label="Open location in Google Maps">
            <iframe
              id="map-frame"
              title="Google Maps location"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <span class="map-fallback" id="map-fallback-label">Open Google Maps</span>
          </a>
        </section>

        <footer class="site-footer">
          <p id="footer-note"></p>
          <a id="creator-link" href="#"></a>
        </footer>
      </section>
    </main>

    <div class="video-modal" id="video-modal" hidden>
      <button class="video-modal__backdrop" id="video-modal-backdrop" type="button" aria-label="Close video"></button>
      <div class="video-modal__panel" role="dialog" aria-modal="true" aria-label="Demo video">
        <button class="video-modal__close" id="video-modal-close" type="button" aria-label="Close video">
          <i data-lucide="x"></i>
        </button>
        <video
          id="demo-video"
          controls
          playsinline
          preload="metadata"
        ></video>
      </div>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="./config.js"></script>
    <script src="./i18n.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
